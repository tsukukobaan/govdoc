name: Update GovDoc Data

on:
  schedule:
    # Run daily at 03:00 JST (18:00 UTC)
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      steps:
        description: "Comma-separated steps (scrape,kokkai,crawl,download,fts)"
        required: false
        default: ""
      skip_download:
        description: "Skip PDF download step"
        required: false
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      # Scrapers write directly to Turso (no dev.db needed)
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        working-directory: scripts
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run update pipeline
        working-directory: scripts
        run: |
          ARGS="--continue-on-error"
          if [ -n "${{ github.event.inputs.steps }}" ]; then
            ARGS="$ARGS --steps ${{ github.event.inputs.steps }}"
          fi
          if [ "${{ github.event.inputs.skip_download }}" = "true" ]; then
            ARGS="$ARGS --skip-download"
          fi
          python update_pipeline.py $ARGS

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-logs-${{ github.run_id }}
          path: logs/update_*.json
          retention-days: 30
