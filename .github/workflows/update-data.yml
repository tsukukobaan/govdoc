name: Update GovDoc Data

on:
  schedule:
    # Run daily at 03:00 JST (18:00 UTC)
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      steps:
        description: "Comma-separated steps (scrape,kokkai,crawl,download,sync,fts)"
        required: false
        default: ""
      skip_sync:
        description: "Skip Turso sync & FTS rebuild"
        required: false
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Install Python dependencies
        working-directory: web/scripts
        run: |
          pip install requests beautifulsoup4 tqdm PyMuPDF boto3 python-dotenv

      - name: Download dev.db from R2
        working-directory: web
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python -c "
          import boto3, os
          s3 = boto3.client('s3',
            endpoint_url=f'https://{os.environ[\"R2_ACCOUNT_ID\"]}.r2.cloudflarestorage.com',
            aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
            aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
            region_name='auto')
          try:
            s3.download_file(os.environ['R2_BUCKET_NAME'], 'backups/dev.db', 'dev.db')
            print('Downloaded dev.db from R2')
          except Exception as e:
            print(f'No backup found in R2: {e}')
            print('Will start with empty DB if no local DB exists')
          "

      - name: Run update pipeline
        working-directory: web
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          ARGS="--continue-on-error"
          if [ -n "${{ github.event.inputs.steps }}" ]; then
            ARGS="$ARGS --steps ${{ github.event.inputs.steps }}"
          fi
          if [ "${{ github.event.inputs.skip_sync }}" = "true" ]; then
            ARGS="$ARGS --skip-sync"
          fi
          python scripts/update_pipeline.py $ARGS

      - name: Upload dev.db backup to R2
        if: always()
        working-directory: web
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python -c "
          import boto3, os
          if not os.path.exists('dev.db'):
            print('No dev.db to upload')
            exit(0)
          s3 = boto3.client('s3',
            endpoint_url=f'https://{os.environ[\"R2_ACCOUNT_ID\"]}.r2.cloudflarestorage.com',
            aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
            aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
            region_name='auto')
          s3.upload_file('dev.db', os.environ['R2_BUCKET_NAME'], 'backups/dev.db')
          print('Uploaded dev.db backup to R2')
          "

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-logs-${{ github.run_id }}
          path: web/logs/update_*.json
          retention-days: 30
